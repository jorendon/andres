<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andres' Birthday Bash | Roblox Edition</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://i.postimg.cc/Xv4NJHnZ/avatar.png">

    <!-- Meta etiquetas para WhatsApp y redes sociales (EN INGLÉS) -->
    <meta property="og:title" content="Andres' Roblox Birthday Bash! 🎮">
    <meta property="og:description" content="You're invited to celebrate Andres' 9th Birthday! Level Up with us on April 18th. RSVP inside!">
    
    <!-- Link del preview de la invitación completa -->
    <meta property="og:image" content="https://i.postimg.cc/R0mY8v9m/Andres-Invitation-Preview.png">
    <meta property="og:image:secure_url" content="https://i.postimg.cc/R0mY8v9m/Andres-Invitation-Preview.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="800">
    <meta property="og:image:height" content="1000">
    
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Andres' Roblox Birthday Bash! 🎮">
    <meta name="twitter:description" content="You're invited! Join us for a Level 9 Roblox Party.">
    <meta name="twitter:image" content="https://i.postimg.cc/R0mY8v9m/Andres-Invitation-Preview.png">

    <!-- Herramientas externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --roblox-sky: #2CB1FF;
            --roblox-grass: #66CC33;
            --roblox-lava: #FF6600;
            --roblox-gold: #FFCC00;
            --roblox-blue-dark: #0066CC;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: #e5e7eb;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
            background-image: linear-gradient(rgba(44, 177, 255, 0.7), rgba(44, 177, 255, 0.7)), url('https://images.unsplash.com/photo-1620121692029-d088224ddc74?q=80&w=2064&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .roblox-font {
            font-family: 'Luckiest Guy', cursive;
        }

        .multicolor-text span {
            display: inline-block;
            -webkit-text-stroke: 2px #000;
            filter: drop-shadow(0 4px 0px rgba(0,0,0,0.4));
        }

        .floating {
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1.5deg); }
        }

        .roblox-card {
            background: white;
            border: 6px solid var(--roblox-gold);
            border-bottom: 14px solid var(--roblox-lava);
            border-radius: 32px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            position: relative;
            z-index: 10;
            overflow: hidden;
        }

        .card-header-bg {
            background-image: url('https://images.unsplash.com/photo-1620121692029-d088224ddc74?q=80&w=2064&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            height: 160px;
            position: relative;
        }

        .card-header-overlay {
            background: linear-gradient(to bottom, rgba(0, 102, 204, 0.4), rgba(255, 255, 255, 1));
            position: absolute;
            inset: 0;
        }

        .btn-action {
            background-color: var(--roblox-grass);
            border-bottom: 8px solid #00813D;
            transition: all 0.1s;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.2);
        }

        .btn-action:active {
            border-bottom-width: 0;
            transform: translateY(8px);
        }

        .avatar-box {
            position: relative;
            width: 170px;
            height: 170px;
            margin: -85px auto 10px; 
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.4));
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.9) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
        }

        #langToggleCard {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #f3f4f6;
            border: 2px solid #d1d5db;
            color: #4b5563;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 800;
            margin-top: 15px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .confetti-slow {
            position: fixed;
            top: -20px;
            animation: fall 5s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        .loading-spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 20px; height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="invitation-card" class="max-w-md w-full roblox-card text-center bg-white">
        
        <div class="card-header-bg">
            <div class="card-header-overlay"></div>
            <div class="relative z-10 pt-6">
                <h1 id="titleTxt" class="multicolor-text roblox-font text-5xl sm:text-6xl tracking-widest uppercase">
                    <span style="color: var(--roblox-lava)">B</span><span style="color: var(--roblox-gold)">I</span><span style="color: var(--roblox-sky)">R</span><span style="color: var(--roblox-grass)">T</span><span style="color: var(--roblox-lava)">H</span><span style="color: var(--roblox-gold)">D</span><span style="color: var(--roblox-sky)">A</span><span style="color: var(--roblox-grass)">Y</span><span style="color: var(--roblox-lava)">!</span>
                </h1>
                <p id="subTitle" class="text-[var(--roblox-blue-dark)] font-black text-xl tracking-widest uppercase mt-1">Party Invitation</p>
            </div>
        </div>

        <div class="px-8 pb-8 pt-4 relative">
            <div class="avatar-box floating">
                <img src="https://i.postimg.cc/Xv4NJHnZ/avatar.png" alt="Andres Avatar" class="w-full h-full object-contain">
            </div>

            <div class="mb-6">
                <h2 id="turningTxt" class="text-2xl font-black text-[var(--roblox-blue-dark)] uppercase">Andres is turning...</h2>
                <div class="inline-block bg-[var(--roblox-lava)] text-white roblox-font text-3xl px-6 py-1 rounded-full shadow-lg transform -rotate-2">
                    <span id="levelLabel">LEVEL</span> 9
                </div>
            </div>
            
            <div class="space-y-4 text-left bg-blue-50/70 p-6 rounded-[2.5rem] border-4 border-[var(--roblox-sky)] shadow-inner">
                <div class="flex items-center gap-4">
                    <div class="bg-[var(--roblox-gold)] p-3 rounded-xl text-white shadow-lg">
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10z"/></svg>
                    </div>
                    <div>
                        <p id="whenLabel" class="text-[10px] text-blue-400 font-black uppercase tracking-widest mb-0">When</p>
                        <p id="dateTxt" class="font-bold text-gray-700 leading-tight">Saturday, April 18, 2026<br><span id="timeTxt" class="text-xs">Starting at 2:00 PM</span></p>
                    </div>
                </div>
                
                <a href="https://www.google.com/maps/search/?api=1&query=469+Bohannon+Blvd,+Orlando+FL+32824" target="_blank" class="flex items-center gap-4 hover:scale-[1.02] transition-transform">
                    <div class="bg-[var(--roblox-lava)] p-3 rounded-xl text-white shadow-lg">
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                    </div>
                    <div>
                        <p id="whereLabel" class="text-[10px] text-blue-400 font-black uppercase tracking-widest mb-0">Where (Maps)</p>
                        <p class="font-bold text-gray-700 leading-tight">469 Bohannon Blvd,<br>Orlando FL 32824</p>
                    </div>
                </a>
            </div>

            <button id="rsvpBtn" class="w-full mt-8 py-5 px-6 rounded-3xl btn-action text-white roblox-font text-3xl tracking-widest shadow-xl">
                RSVP NOW
            </button>
            
            <button id="langToggleCard" onclick="toggleLanguage()">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
                <span id="langBtnLabel">ES ⇄ EN</span>
            </button>

           <p class="mt-6 text-[9px] text-blue-300 font-black uppercase tracking-[0.3em]">
               Powered by <a href="https://jrendon.dev" target="_blank" class="hover:text-[var(--roblox-gold)] transition-colors underline">Jonathan Rendon</a> 2026
           </p>
        </div>
    </div>

    <!-- Modal RSVP -->
    <div id="modal" class="fixed inset-0 bg-black/85 backdrop-blur-md z-50 hidden items-center justify-center p-4">
        <div class="bg-white rounded-[3rem] max-w-sm w-full p-8 border-[6px] border-[var(--roblox-gold)] border-b-[12px] relative shadow-2xl">
            <button id="closeBtn" class="absolute top-4 right-4 text-gray-400 hover:text-red-500 transition-all">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>

            <div id="formContainer">
                <h3 id="modalTitle" class="roblox-font text-3xl text-center text-gray-800 mb-6 uppercase">Confirm RSVP</h3>
                <form id="rsvpForm" class="space-y-4">
                    <div>
                        <label id="labelName" class="block text-[10px] font-black text-gray-400 uppercase mb-1 ml-1">Player Name</label>
                        <input type="text" id="pName" required class="w-full px-4 py-3 rounded-xl border-4 border-blue-50 bg-blue-50 focus:bg-white focus:border-[var(--roblox-sky)] outline-none font-bold text-gray-700 transition-all" placeholder="...">
                    </div>
                    <div>
                        <label id="labelPhone" class="block text-[10px] font-black text-gray-400 uppercase mb-1 ml-1">Phone Number</label>
                        <input type="tel" id="pPhone" required class="w-full px-4 py-3 rounded-xl border-4 border-blue-50 bg-blue-50 focus:bg-white focus:border-[var(--roblox-sky)] outline-none font-bold text-gray-700 transition-all" placeholder="...">
                    </div>
                    <div>
                        <label id="labelGuests" class="block text-[10px] font-black text-gray-400 uppercase mb-1 ml-1">Guests</label>
                        <input type="number" id="pGuests" required min="1" max="10" value="1" class="w-full px-4 py-3 rounded-xl border-4 border-blue-50 bg-blue-50 focus:bg-white focus:border-[var(--roblox-sky)] outline-none font-bold text-gray-700 transition-all">
                    </div>
                    <button type="submit" id="submitBtn" class="w-full py-4 bg-[var(--roblox-grass)] text-white roblox-font text-xl rounded-xl border-b-[6px] border-[#4da822] active:border-b-0 active:translate-y-1 flex items-center justify-center gap-3">
                        <span id="btnSubmitTxt">CONFIRM JOIN</span>
                        <div id="spinner" class="loading-spinner hidden"></div>
                    </button>
                </form>
            </div>

            <!-- MENSAJES DE RESPUESTA -->
            <div id="successMsg" class="hidden text-center py-6">
                <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4 animate-bounce">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </div>
                <h4 id="successTitle" class="roblox-font text-3xl text-gray-800 uppercase">You're In!</h4>
                <p id="successSub" class="text-gray-500 font-bold mt-2">See you on April 18th!</p>
            </div>

            <div id="errorMsg" class="hidden text-center py-6">
                <div class="w-20 h-20 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4 border-4 border-red-200">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </div>
                <h4 id="errorTitle" class="roblox-font text-2xl text-red-600 uppercase">Alert!</h4>
                <p id="errorSub" class="text-gray-500 font-bold mt-2">This phone number is already registered.</p>
            </div>
        </div>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbzYtSUhIE6tSvDdJBAMffn9gno23W4kyGE_FGrA3_AmIoEUK6RAzJryUAsMv3ykRxI/exec"; 
        
        let currentLang = 'en';

        const translations = {
            es: {
                subTitle: "Invitación de Fiesta",
                turningTxt: "Andrés cumple...",
                levelLabel: "NIVEL",
                whenLabel: "Cuándo",
                dateTxt: "Sábado, 18 de Abril, 2026",
                timeTxt: "A partir de las 2:00 PM",
                whereLabel: "Dónde (Mapa)",
                rsvpBtn: "CONFIRMAR ASISTENCIA",
                modalTitle: "Confirmar RSVP",
                labelName: "Nombre del Jugador",
                labelPhone: "Número de Teléfono",
                labelGuests: "Invitados",
                btnSubmitTxt: "¡ME UNO AL JUEGO!",
                joining: "UNIÉNDOSE...",
                successTitle: "¡Ya estás dentro!",
                successSub: "¡Nos vemos el 18 de abril!",
                errorTitle: "¡Alerta!",
                errorSub: "Este número ya está registrado.",
                placeholderName: "Tu nombre...",
                placeholderPhone: "Tu teléfono...",
                langBtn: "ES ⇄ EN"
            },
            en: {
                subTitle: "Party Invitation",
                turningTxt: "Andres is turning...",
                levelLabel: "LEVEL",
                whenLabel: "When",
                dateTxt: "Saturday, April 18, 2026",
                timeTxt: "Starting at 2:00 PM",
                whereLabel: "Where (Maps)",
                rsvpBtn: "RSVP NOW",
                modalTitle: "Confirm RSVP",
                labelName: "Player Name",
                labelPhone: "Phone Number",
                labelGuests: "Squad Size (Guests)",
                btnSubmitTxt: "CONFIRM JOIN",
                joining: "JOINING...",
                successTitle: "You're In!",
                successSub: "See you on April 18th!",
                errorTitle: "Alert!",
                errorSub: "This phone number is already registered.",
                placeholderName: "Enter name...",
                placeholderPhone: "Enter phone...",
                langBtn: "EN ⇄ ES"
            }
        };

        function updateLanguage(lang) {
            const t = translations[lang];
            document.getElementById('subTitle').textContent = t.subTitle;
            document.getElementById('turningTxt').textContent = t.turningTxt;
            document.getElementById('levelLabel').textContent = t.levelLabel;
            document.getElementById('whenLabel').textContent = t.whenLabel;
            document.getElementById('dateTxt').innerHTML = `${t.dateTxt}<br><span id="timeTxt" class="text-xs">${t.timeTxt}</span>`;
            document.getElementById('whereLabel').textContent = t.whereLabel;
            document.getElementById('rsvpBtn').textContent = t.rsvpBtn;
            document.getElementById('modalTitle').textContent = t.modalTitle;
            document.getElementById('labelName').textContent = t.labelName;
            document.getElementById('labelPhone').textContent = t.labelPhone;
            document.getElementById('labelGuests').textContent = t.labelGuests;
            document.getElementById('btnSubmitTxt').textContent = t.btnSubmitTxt;
            document.getElementById('pName').placeholder = t.placeholderName;
            document.getElementById('pPhone').placeholder = t.placeholderPhone;
            document.getElementById('successTitle').textContent = t.successTitle;
            document.getElementById('successSub').textContent = t.successSub;
            document.getElementById('errorTitle').textContent = t.errorTitle;
            document.getElementById('errorSub').textContent = t.errorSub;
            document.getElementById('langBtnLabel').textContent = t.langBtn;
        }

        function toggleLanguage() {
            currentLang = currentLang === 'es' ? 'en' : 'es';
            updateLanguage(currentLang);
        }

        window.onload = () => {
            const userLang = (navigator.language || navigator.userLanguage).toLowerCase();
            currentLang = userLang.startsWith('es') ? 'es' : 'en';
            updateLanguage(currentLang);
            createConfetti();
        };

        const modal = document.getElementById('modal');
        const rsvpBtn = document.getElementById('rsvpBtn');
        const closeBtn = document.getElementById('closeBtn');
        const rsvpForm = document.getElementById('rsvpForm');
        const successMsg = document.getElementById('successMsg');
        const errorMsg = document.getElementById('errorMsg');
        const formContainer = document.getElementById('formContainer');
        const submitBtn = document.getElementById('submitBtn');
        const spinner = document.getElementById('spinner');
        const btnSubmitTxt = document.getElementById('btnSubmitTxt');

        rsvpBtn.onclick = () => {
            modal.classList.replace('hidden', 'flex');
            formContainer.classList.remove('hidden');
            successMsg.classList.add('hidden');
            errorMsg.classList.add('hidden');
        };

        closeBtn.onclick = () => modal.classList.replace('flex', 'hidden');

        rsvpForm.onsubmit = async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            spinner.classList.remove('hidden');
            btnSubmitTxt.textContent = translations[currentLang].joining;

            const formData = {
                name: document.getElementById('pName').value,
                phone: document.getElementById('pPhone').value,
                guests: document.getElementById('pGuests').value
            };

            try {
                await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                
                formContainer.classList.add('hidden');
                successMsg.classList.remove('hidden');
                setTimeout(() => { modal.classList.replace('flex', 'hidden'); rsvpForm.reset(); }, 4000);
                
            } catch (error) {
                console.error(error);
            } finally {
                submitBtn.disabled = false;
                spinner.classList.add('hidden');
                btnSubmitTxt.textContent = translations[currentLang].btnSubmitTxt;
            }
        };

        function createConfetti() {
            for(let i=0; i<30; i++) {
                const c = document.createElement('div');
                c.className = 'confetti-slow';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.width = (Math.random() * 8 + 4) + 'px';
                c.style.height = c.style.width;
                c.style.background = ['#FFD700', '#2CB1FF', '#FFFFFF', '#FF6600', '#66CC33'][Math.floor(Math.random()*5)];
                c.style.animationDuration = (Math.random() * 3 + 4) + 's';
                c.style.animationDelay = (Math.random() * 5) + 's';
                c.style.borderRadius = '2px';
                document.body.appendChild(c);
            }
        }

        window.onclick = (e) => { if (e.target === modal) closeBtn.onclick(); };
    </script>
</body>
</html>
