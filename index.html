<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andres' Birthday Bash | Roblox Edition</title>
    <!-- Importando Tailwind y la fuente Source Sans 3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Colores vibrantes de Roblox */
            --roblox-sky: #2CB1FF;
            --roblox-grass: #66CC33;
            --roblox-lava: #FF6600;
            --roblox-gold: #FFCC00;
            --roblox-blue-dark: #0066CC;
        }

        body {
            /* Usando la nueva fuente Source Sans 3 */
            font-family: 'Source Sans 3', sans-serif;
            background: linear-gradient(135deg, var(--roblox-sky) 0%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .roblox-font {
            font-family: 'Luckiest+Guy', cursive;
        }

        /* Animación de flotado */
        .floating {
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1.5deg); }
        }

        /* Tarjeta tipo plataforma 3D */
        .roblox-card {
            background: white;
            border: 6px solid var(--roblox-gold);
            border-bottom: 14px solid var(--roblox-lava);
            border-radius: 32px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            position: relative;
            z-index: 10;
        }

        /* Base de grama para la plataforma */
        .roblox-card::after {
            content: '';
            position: absolute;
            bottom: -24px;
            left: 5%;
            width: 90%;
            height: 24px;
            background: var(--roblox-grass);
            border-bottom: 6px solid #4da822;
            border-radius: 0 0 28px 28px;
            z-index: -1;
        }

        .btn-action {
            background-color: var(--roblox-grass);
            border-bottom: 8px solid #00813D;
            transition: all 0.1s;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.2);
        }

        .btn-action:active {
            border-bottom-width: 0;
            transform: translateY(8px);
        }

        .avatar-box {
            position: relative;
            width: 220px;
            height: 220px;
            margin: -110px auto 20px;
            filter: drop-shadow(0 15px 15px rgba(0,0,0,0.3));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .loading-spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .cloud {
            position: absolute;
            background: rgba(255,255,255,0.8);
            border-radius: 50px;
            filter: blur(10px);
            z-index: 1;
        }

        .confetti-slow {
            position: absolute;
            animation: fall 5s linear infinite;
            pointer-events: none;
        }

        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(500px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Decoración: Nubes de fondo -->
    <div class="cloud w-32 h-12 top-10 left-10 animate-pulse"></div>
    <div class="cloud w-48 h-16 bottom-10 right-10 animate-pulse" style="animation-delay: 2s;"></div>

    <!-- Contenedor Principal de la Invitación -->
    <div class="max-w-md w-full roblox-card overflow-hidden text-center">
        <!-- Banner Superior -->
        <div id="main-banner" class="h-48 bg-gradient-to-b from-[var(--roblox-blue-dark)] to-[var(--roblox-sky)] flex flex-col items-center justify-center relative overflow-hidden">
            <div class="z-10 px-4">
                <h1 class="text-white roblox-font text-5xl sm:text-6xl tracking-widest drop-shadow-[0_4px_0px_rgba(0,0,0,0.6)] uppercase">Birthday Party</h1>
                <p class="text-[var(--roblox-gold)] font-bold text-base mt-1 tracking-widest uppercase drop-shadow-md">Andres is Leveling Up</p>
            </div>
        </div>

        <div class="px-8 pb-12 pt-32 relative">
            <!-- Imagen del Avatar solicitado -->
            <div class="avatar-box floating">
                <img src="image_05e454.png" alt="Andres Avatar" class="avatar-img" onerror="this.src='https://images.rbxcdn.com/f9e80a0a0f0e8f0e0f0e0f0e0f0e0f0e.png'; console.log('Image not found, using fallback');">
            </div>

            <h2 class="text-4xl font-black text-[var(--roblox-blue-dark)] uppercase roblox-font drop-shadow-sm mb-6">You're Invited!</h2>
            
            <!-- Bloque de Información -->
            <div class="space-y-4 text-left bg-blue-50/70 p-6 rounded-[2.5rem] border-4 border-[var(--roblox-sky)] shadow-inner">
                <div class="flex items-center gap-4">
                    <div class="bg-[var(--roblox-gold)] p-3.5 rounded-2xl text-white shadow-lg border-b-4 border-[#cc9900]">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><rect x="3" y="4" width="18" height="18" rx="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    </div>
                    <div>
                        <p class="text-[10px] text-blue-400 font-black uppercase tracking-widest">When</p>
                        <p class="font-bold text-gray-700 text-lg leading-tight">Saturday, April 18, 2026</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="bg-[var(--roblox-lava)] p-3.5 rounded-2xl text-white shadow-lg border-b-4 border-[#cc4400]">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                    </div>
                    <div>
                        <p class="text-[10px] text-blue-400 font-black uppercase tracking-widest">Location</p>
                        <p class="font-bold text-gray-700 leading-tight">469 Bohannon Blvd,<br>Orlando FL 32824</p>
                    </div>
                </div>
            </div>

            <!-- Botón de Confirmación -->
            <button id="rsvpBtn" class="w-full mt-10 py-5 px-6 rounded-3xl btn-action text-white roblox-font text-4xl tracking-widest shadow-2xl">
                RSVP
            </button>
            
            <p class="mt-8 text-[9px] text-blue-300 font-black uppercase tracking-[0.4em]">Level Up Celebration 2026</p>
        </div>
    </div>

    <!-- Modal para el Formulario RSVP -->
    <div id="modal" class="fixed inset-0 bg-black/85 backdrop-blur-md z-50 hidden items-center justify-center p-4">
        <div class="bg-white rounded-[3.5rem] max-w-sm w-full p-10 border-[6px] border-[var(--roblox-gold)] border-b-[14px] relative shadow-2xl">
            <button id="closeBtn" class="absolute top-6 right-6 text-gray-300 hover:text-red-500 transition-all scale-125">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>

            <div id="formContainer">
                <h3 class="roblox-font text-4xl text-center text-gray-800 mb-8 uppercase tracking-tighter">RSVP</h3>
                <form id="rsvpForm" class="space-y-6">
                    <div>
                        <label class="block text-[11px] font-black text-gray-400 uppercase mb-2 ml-1">Guest Name</label>
                        <input type="text" id="pName" required class="w-full px-5 py-4 rounded-2xl border-4 border-blue-50 bg-blue-50 focus:bg-white focus:border-[var(--roblox-sky)] outline-none font-bold text-gray-700 transition-all" placeholder="Enter name...">
                    </div>
                    <div>
                        <label class="block text-[11px] font-black text-gray-400 uppercase mb-2 ml-1">Squad Size</label>
                        <input type="number" id="pGuests" required min="1" max="10" value="1" class="w-full px-5 py-4 rounded-2xl border-4 border-blue-50 bg-blue-50 focus:bg-white focus:border-[var(--roblox-sky)] outline-none font-bold text-gray-700 transition-all">
                    </div>
                    <button type="submit" id="submitBtn" class="w-full py-5 bg-[var(--roblox-grass)] text-white roblox-font text-2xl rounded-2xl border-b-[8px] border-[#4da822] active:border-b-0 active:translate-y-2 flex items-center justify-center gap-3">
                        <span id="btnText">CONFIRM</span>
                        <div id="spinner" class="loading-spinner hidden"></div>
                    </button>
                </form>
            </div>

            <!-- Vista de éxito -->
            <div id="successMsg" class="hidden text-center py-8">
                <div class="w-24 h-24 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6 animate-bounce border-4 border-green-200">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </div>
                <h4 class="roblox-font text-4xl text-gray-800 uppercase">Success!</h4>
                <p class="text-gray-500 font-bold mt-4 text-lg text-center">You're on the list! See you at the party.</p>
            </div>
        </div>
    </div>

    <script>
        // RECUERDA: Pega tu URL de Google Apps Script aquí para que funcione el envío
        const scriptURL = "https://script.google.com/macros/s/AKfycbzYtSUhIE6tSvDdJBAMffn9gno23W4kyGE_FGrA3_AmIoEUK6RAzJryUAsMv3ykRxI/exec"; 

        const modal = document.getElementById('modal');
        const rsvpBtn = document.getElementById('rsvpBtn');
        const closeBtn = document.getElementById('closeBtn');
        const rsvpForm = document.getElementById('rsvpForm');
        const successMsg = document.getElementById('successMsg');
        const formContainer = document.getElementById('formContainer');
        const submitBtn = document.getElementById('submitBtn');
        const spinner = document.getElementById('spinner');
        const btnText = document.getElementById('btnText');

        // Función para abrir modal
        rsvpBtn.onclick = () => {
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            formContainer.classList.remove('hidden');
            successMsg.classList.add('hidden');
        };

        // Función para cerrar modal
        closeBtn.onclick = () => {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        };

        // Manejo del formulario
        rsvpForm.onsubmit = async (e) => {
            e.preventDefault();
            
            if (!scriptURL) {
                console.warn("Falta pegar la scriptURL de Google Sheets.");
                formContainer.classList.add('hidden');
                successMsg.classList.remove('hidden');
                setTimeout(() => { modal.classList.replace('flex', 'hidden'); }, 4000);
                return;
            }

            submitBtn.disabled = true;
            spinner.classList.remove('hidden');
            btnText.textContent = "SENDING...";

            try {
                // Envío de datos al script de Google
                await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('pName').value,
                        guests: document.getElementById('pGuests').value
                    })
                });
                
                formContainer.classList.add('hidden');
                successMsg.classList.remove('hidden');
                setTimeout(() => { 
                    modal.classList.replace('flex', 'hidden'); 
                    rsvpForm.reset();
                }, 4000);
            } catch (error) {
                console.error("Error enviando RSVP", error);
                alert("Ocurrió un error. Por favor intenta de nuevo.");
            } finally {
                submitBtn.disabled = false;
                spinner.classList.add('hidden');
                btnText.textContent = "CONFIRM";
            }
        };

        // Efecto de confeti en el banner
        const banner = document.getElementById('main-banner');
        for(let i=0; i<30; i++) {
            const c = document.createElement('div');
            c.className = 'confetti-slow';
            c.style.left = Math.random() * 100 + '%';
            c.style.width = (Math.random() * 10 + 5) + 'px';
            c.style.height = c.style.width;
            c.style.background = ['#FFD700', '#2CB1FF', '#FFFFFF', '#FF6600', '#66CC33'][Math.floor(Math.random()*5)];
            c.style.animationDelay = Math.random() * 5 + 's';
            c.style.borderRadius = '2px';
            banner.appendChild(c);
        }

        // Cerrar modal si se hace clic fuera de la tarjeta
        window.onclick = (e) => { if (e.target === modal) closeBtn.onclick(); };
    </script>
</body>
</html>
